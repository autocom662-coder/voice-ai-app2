<!DOCTYPE html>
<html>
<head>
    <title>Voice AI App</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a192f, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 20px;
            width: 340px;
            text-align: center;
        }

        h1 { color: #7c3aed; }

        select, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
        }

        button {
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: white;
            font-weight: bold;
        }

        #output {
            margin-top: 15px;
            background: #020617;
            padding: 15px;
            border-radius: 10px;
            min-height: 60px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🎤 Voice AI</h1>

    <!-- Language -->
    <select id="lang">
        <option value="en-US">English</option>
        <option value="en-GB">English UK</option>
        <option value="fr-FR">French</option>
        <option value="es-ES">Spanish</option>
    </select>

    <button onclick="start()">🎤 Start Speaking</button>
    <button onclick="speak()">🔊 Play Voice</button>
    <button onclick="saveText()">💾 Save Text</button>

    <div id="output">Your speech will appear here...</div>
</div>

<script>
let recognition;
let textResult = "";

function start() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Use Chrome browser!");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = document.getElementById("lang").value;
    recognition.start();

    recognition.onresult = function(event) {
        textResult = event.results[0][0].transcript;
        document.getElementById("output").innerText = textResult;
    };
}

// 🔊 Voice Playback
function speak() {
    if (!textResult) {
        alert("No text to speak");
        return;
    }

    let speech = new SpeechSynthesisUtterance(textResult);
    speech.lang = document.getElementById("lang").value;
    window.speechSynthesis.speak(speech);
}

// 💾 Save Text
function saveText() {
    if (!textResult) {
        alert("No text to save");
        return;
    }

    let blob = new Blob([textResult], { type: "text/plain" });
    let link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "speech.txt";
    link.click();
}
</script>

</body>
</html>
